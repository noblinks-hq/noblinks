{{- if eq (include "noblinks-agent.deployPrometheus" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "noblinks-agent.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noblinks-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "noblinks-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
{{- end }}
