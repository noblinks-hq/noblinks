{{- if eq (include "noblinks-agent.deployPrometheus" .) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "noblinks-agent.fullname" . }}-prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noblinks-agent.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['{{ include "noblinks-agent.fullname" . }}-alertmanager.{{ .Release.Namespace }}.svc.cluster.local:9093']

    rule_files:
      - /etc/prometheus/rules/noblinks.yml

    scrape_configs:
      - job_name: 'node-exporter'
        {{- if .Values.nodeExporter.enabled }}
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Release.Namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: node-exporter
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: instance
          - source_labels: [__address__]
            regex: (.+):.*
            replacement: ${1}:9100
            target_label: __address__
        {{- else }}
        static_configs:
          - targets: []
        {{- end }}

      - job_name: 'kube-state-metrics'
        {{- if .Values.kubeStateMetrics.enabled }}
        static_configs:
          - targets: ['{{ include "noblinks-agent.fullname" . }}-kube-state-metrics.{{ .Release.Namespace }}.svc.cluster.local:8080']
        {{- else }}
        static_configs:
          - targets: []
        {{- end }}

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            replacement: /api/v1/nodes/${1}/proxy/metrics
            target_label: __metrics_path__

      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
            target_label: __metrics_path__

      {{- if .Values.prometheus.extraScrapeConfigs }}
      {{ .Values.prometheus.extraScrapeConfigs | nindent 6 }}
      {{- end }}
{{- end }}
