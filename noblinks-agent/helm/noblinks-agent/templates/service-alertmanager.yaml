{{- if eq (include "noblinks-agent.deployAlertmanager" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "noblinks-agent.fullname" . }}-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "noblinks-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "noblinks-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
{{- end }}
